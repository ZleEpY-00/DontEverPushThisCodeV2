name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# TODO#0: Declare workflow permissions.
permissions:
  contents: read
  security-events: write   # #0a: required for SARIF upload to GitHub Security tab
  issues: write            # #0b: allow Gitleaks/Sonar to comment on issues
  pull-requests: write     # #0b: allow Gitleaks/Sonar to comment on PRs
  id-token: write          # #0c: OIDC token
  actions: read

jobs:
  # GATE#0: Secret scanning (TruffleHog + Gitleaks)
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#1: fetch full git history so TruffleHog can diff all commits
          # (secrets may have been committed then reverted in old commits)
          fetch-depth: 0

      # TruffleHog: scans for VERIFIED live credentials
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          # TODO#2: scan the diff between default branch and HEAD
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # TODO#3: only report verified secrets to reduce noise
          extra_args: --only-verified

      # TODO#4: Gitleaks — scans for regex-pattern secrets
      # Difference: TruffleHog verifies live creds (fewer false positives, fewer misses)
      #             Gitleaks matches regex patterns (more false positives, may miss novel creds)
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # GATE#1a: SAST via SonarQube
  sast-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#5: full history needed for blame + new-code detection
          fetch-depth: 0

      # TODO#6: SonarQube scan
      # Note: findings appear in SonarCloud dashboard, NOT GitHub Security tab
      # because SonarCloud uses its own API token to report results (not SARIF format)
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # GATE#1b: SAST via CodeQL
  codeql-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    strategy:
      matrix:
        # TODO#7: Next.js/React is written in JavaScript
        language: [ 'javascript' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # TODO#8: use both suites
          # security-extended    = OWASP/CWE Top 25 + extra vuln checks
          # security-and-quality = security-extended + maintainability/reliability rules
          # Using both gives broader coverage than either alone
          queries: security-extended,security-and-quality

      # TODO#9: analyze step — category prevents matrix runs from colliding in Security tab
      # (if two languages share the same category, CodeQL overwrites results)
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # GATE#2: Dependency scanning via OWASP Dependency-Check
  dependency-scanning:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#10: set up Node 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # TODO#11: install deps so Dependency-Check can resolve the full tree
      - name: Install dependencies
        run: npm ci

      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        id: Depcheck
        with:
          project: 'DontEverPushThisCodeV2'
          path: '.'
          # TODO#12: SARIF format integrates with GitHub Security tab
          format: 'SARIF'
          out: 'reports'
          args: >
            --failOnCVSS 7
            --enableRetired
          # TODO#13: block on CVSS >= 7.0 (HIGH and above)

      # TODO#14: upload SARIF to GitHub Security tab
      - name: Upload Depcheck SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      # TODO#15: upload raw HTML report as artifact
      - name: Upload Depcheck HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports/

  # GATE#3: Container/Image scanning via Trivy
  image-scanning:
    runs-on: ubuntu-latest
    needs: [dependency-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#16: build Docker image
      - name: Build Docker image
        run: docker build -t my-app:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'my-app:latest'
          # TODO#17: sarif format integrates with GitHub Security tab
          format: 'sarif'
          output: 'trivy-results.sarif'
          # TODO#18: report HIGH and CRITICAL only
          # LOW/MEDIUM should NOT block build — they create unnecessary pipeline friction
          # and may have no available fix; report them for awareness but don't block
          severity: 'HIGH,CRITICAL'
          # TODO#19: skip CVEs with no available fix to reduce noise
          ignore-unfixed: true

      # TODO#20: upload Trivy SARIF to GitHub Security tab
      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # TODO#21: upload raw SARIF as workflow artifact
      - name: Upload Trivy results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # GATE#4: IaC scanning — skipped (out of scope)
  # GATE#5: DAST — skipped (covered in OWASP ZAP workshop)
  